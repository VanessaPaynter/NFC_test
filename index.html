<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Hype ✨</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Montserrat:wght@500&family=Pacifico&family=Oswald:wght@600&display=swap" rel="stylesheet">
<style>
  body{
    margin:0;
    padding-top:env(safe-area-inset-top,20px);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-start;
    min-height:100vh;
    background:radial-gradient(circle at 20% 20%, #1a1a2e,#000);
    overflow-x:hidden;
    font-family:sans-serif;
    position:relative;
  }

  /* Sparkles */
  #sparkleContainer{
    position:absolute;
    top:0; left:0;
    width:100%; height:100%;
    pointer-events:none;
    overflow:hidden;
    z-index:0;
  }
  .sparkle{
    position:absolute;
    width:2px; height:2px;
    background:white;
    border-radius:50%;
    opacity:0;
    animation:twinkle 1.5s infinite;
  }
  @keyframes twinkle{
    0%,100%{opacity:0;transform:scale(.5)}
    50%{opacity:1;transform:scale(1.6)}
  }

  /* Container */
  .container{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-start;
    width:90vw;
    max-width:600px;
    backdrop-filter: blur(12px);
    background:rgba(255,255,255,0.05);
    border-radius:25px;
    box-shadow:0 0 30px rgba(255,255,255,0.2);
    padding:20px;
    margin-top:20px;
    z-index:2;
  }

  /* Message */
  #randomMessage{
    color:white;
    font-weight:bold;
    font-size:1.9rem;
    text-align:center;
    word-wrap:break-word;
    transition:opacity 0.4s ease;
    text-shadow:0 0 12px rgba(255,255,150,0.9);
    margin-bottom:15px;
  }

  /* Image */
  .imageWrapper{
    position:relative;
    width:100%;
    display:flex;
    justify-content:center;
    margin-bottom:15px;
  }
  .imageWrapper img{
    max-width:100%;
    max-height:60vh;
    border-radius:20px;
    opacity:0;
    transform:scale(.96);
    transition:opacity 2s ease, transform 2s ease;
    animation:zoom 12s infinite alternate ease-in-out;
  }
  .imageWrapper img.loaded{
    opacity:1;
    transform:scale(1);
  }
  @keyframes zoom{
    from{transform:scale(1)}
    to{transform:scale(1.05)}
  }

  /* Spotify */
  #musicContainer{
    width:100%;
    display:flex;
    justify-content:center;
    margin-bottom:10px;
  }
  #musicContainer iframe{
    width:90%;
    max-width:320px;
    height:80px;
    border-radius:12px;
    border:none;
  }

  /* Boss Bitch Overlay */
  #bossOverlay{
    position:absolute;
    top:50%; left:50%;
    transform:translate(-50%,-50%);
    color:#ffe066;
    font-size:2rem;
    font-weight:bold;
    text-shadow:0 0 20px #ffe066,0 0 40px #ffdd99;
    opacity:0;
    pointer-events:none;
    transition:opacity 0.3s ease;
    z-index:5;
  }

  /* Refresh */
  #refreshBtn{
    position:fixed;
    bottom:20px;
    right:20px;
    background:white;
    color:black;
    border:none;
    border-radius:50%;
    width:52px;
    height:52px;
    font-size:22px;
    cursor:pointer;
    z-index:10;
  }

  /* Confetti */
  .confetti{
    position:absolute;
    width:8px; height:8px;
    background: #ffe066;
    opacity:1;
    pointer-events:none;
    border-radius:50%;
    animation:confettiFall 1s ease-out forwards;
  }
  @keyframes confettiFall{
    to { transform:translateY(100vh) rotate(720deg); opacity:0;}
  }

  @media screen and (max-width:400px){
    #randomMessage{font-size:1.5rem;}
  }

</style>
</head>
<body>

<div id="sparkleContainer"></div>

<div class="container">
  <div id="randomMessage"></div>
  <div class="imageWrapper"><img id="randomImage"></div>
  <div id="musicContainer"></div>
</div>

<div id="bossOverlay">✨ Boss Bitch Energy Activated ✨</div>
<button id="refreshBtn">✨</button>

<script>

const messages=[

const tracks=[

"https://open.spotify.com/embed/track/4ChomJf8z16E6Zw4EoioYY?utm_source=generator&autoplay=1",

]

const textStyles=[
  {font:"'Playfair Display',serif",italic:true,glow:true,size:"2rem"},
  {font:"'Montserrat',sans-serif",italic:false,glow:false,size:"1.8rem"},
  {font:"'Pacifico',cursive",italic:false,glow:true,size:"2.2rem"},
  {font:"'Oswald',sans-serif",italic:false,glow:true,size:"2rem"}
];

/* ---------- SHUFFLE BAG ---------- */
function shuffle(array){
  for(let i=array.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [array[i],array[j]]=[array[j],array[i]];
  }
}

function createShuffleBag(source){
  let bag=[];
  return function(){
    if(bag.length===0){
      bag=[...source];
      shuffle(bag);
    }
    return bag.pop();
  }
}

const getImage=createShuffleBag(images);
const getMessage=createShuffleBag(messages);
const getTrack=createShuffleBag(tracks);
const getStyle=createShuffleBag(textStyles);

/* ---------- SPARKLES ---------- */
const sparkleContainer=document.getElementById("sparkleContainer");
for(let i=0;i<85;i++){
  const s=document.createElement("div");
  s.className="sparkle";
  s.style.top=Math.random()*100+"%";
  s.style.left=Math.random()*100+"%";
  s.style.width=s.style.height=(Math.random()*2+1)+"px";
  s.style.animationDuration=(Math.random()*1+1)+"s";
  s.style.animationDelay=Math.random()*3+"s";
  sparkleContainer.appendChild(s);
}

/* ---------- GENERATOR ---------- */
function generateHype(){
  /* Boss Overlay */
  const overlay=document.getElementById("bossOverlay");
  overlay.style.opacity=1;
  setTimeout(()=>overlay.style.opacity=0,600);
  createConfetti();

  /* Image */
  const img=getImage();
  const imgEl=document.getElementById("randomImage");
  imgEl.classList.remove("loaded");
  imgEl.src=img+"?"+Date.now();
  imgEl.onload=()=>imgEl.classList.add("loaded");

  /* Message */
  const msg=getMessage();
  const msgEl=document.getElementById("randomMessage");
  msgEl.style.opacity=0;
  setTimeout(()=>{
    const style=getStyle();
    msgEl.textContent=msg;
    msgEl.style.fontFamily=style.font;
    msgEl.style.fontStyle=style.italic?"italic":"normal";
    msgEl.style.fontSize=style.size;
    msgEl.style.color="white";
    msgEl.style.textShadow=style.glow?"0 0 12px rgba(255,255,150,.9)":"none";
    msgEl.style.opacity=1;
  },200);

  /* Spotify */
  const track=getTrack();
  document.getElementById("musicContainer").innerHTML=`<iframe src="${track}" allow="autoplay; encrypted-media"></iframe>`;
}

/* ---------- CONFETTI ---------- */
function createConfetti(){
  const confettiCount=15;
  for(let i=0;i<confettiCount;i++){
    const c=document.createElement("div");
    c.className="confetti";
    c.style.left=Math.random()*90+"%";
    c.style.background=["#ffe066","#ffb6b9","#ff6f91","#d0a9f5"][Math.floor(Math.random()*4)];
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),1000);
  }
}

/* ---------- START ---------- */
generateHype();
document.getElementById("refreshBtn").addEventListener("click",generateHype);
window.addEventListener("focus",generateHype);

</script>
</body>
</html>
</html>
